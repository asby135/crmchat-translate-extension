<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 svg { width: 20px; height: 20px; fill: #3390ec; }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #707579;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input[type="text"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"], select:focus {
      border-color: #3390ec;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .toggle-row label {
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      border-radius: 20px;
      transition: 0.2s;
    }
    .toggle .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .slider {
      background-color: #3390ec;
    }
    .toggle input:checked + .slider:before {
      transform: translateX(16px);
    }
    .divider {
      height: 1px;
      background: #eee;
      margin: 12px 0;
    }
    .status {
      font-size: 12px;
      color: #999;
      text-align: center;
      padding-top: 8px;
    }
    .status.error { color: #e53935; }
    .status.success { color: #43a047; }
  </style>
</head>
<body>
  <h1>
    <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
    CRMChat Translator
  </h1>

  <div class="toggle-row">
    <label>Enable translation</label>
    <div class="toggle">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label>Translate outgoing messages to</label>
    <select id="outboundLanguage">
      <option value="ru">Russian</option>
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="it">Italian</option>
      <option value="pt">Portuguese</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="ar">Arabic</option>
      <option value="hi">Hindi</option>
      <option value="tr">Turkish</option>
      <option value="uk">Ukrainian</option>
      <option value="pl">Polish</option>
      <option value="nl">Dutch</option>
    </select>
  </div>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
